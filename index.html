<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Shower</title>
    <link rel="icon" type="image/png" href="src/svg/sakura.svg" />
    <link rel="stylesheet" href="style/style.css"  >

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
</head>
<body>
    <section class="hero">

        <div class="hero-div">
            <h1>Sakura Shower</h1>
            <h2>The flower gallery</h2>
        </div>

    </section>


    <section class="container" id="presentation">
        
        <img id="img-pres" src="src/image.jpg" alt="image de fleur">
        <img class ="halo2" src="src/svg/halo2.svg">
        <img class="sakura" src="src/svg/sakura.svg" data-speed="0.1">
        
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Reprehenderit impedit accusantium aspernatur iusto</p>
        <img class ="halo" src="src/svg/halo.svg">
        <img class="petale" src="src/svg/petale.svg" data-speed="0.3">
        <img class="petale2" src="src/svg/petale2.svg" data-speed="0.2">
    </section>


    <section class="container" id="suite">
        
        <img id="img-pres" src="src/image2_glass.jpg" alt="image de fleur">
        <img class="sakura2" src="src/svg/sakura2.svg" data-speed="0.15">
        
        
        <img class="petale3" src="src/svg/petale3.svg" data-speed="0.4">
        <img class="petale4" src="src/svg/petale4.svg" data-speed="0.2">
        <img class="petale5" src="src/svg/petale5.svg" data-speed="0.3">
        
        <img class="sakura3" src="src/svg/sakura3.svg" data-speed="0.1">
        
        <img class="petale6" src="src/svg/petale6.svg" data-speed="0.2">
        <img class="petale7" src="src/svg/petale7.svg" data-speed="0.3">
    </section>

    <section class="section-bouton">
    <div class="bouton-wrapper">
        <div id="bouton">
            <a href="#">Discover the gallery</a>
        </div>
        
        <img class="halo3" src="src/svg/halo3.svg" alt="">
    </div>
</section>


<script>
    window.addEventListener('scroll', function() {
        let parallaxElements = document.querySelectorAll('[data-speed]');
        
        // Pour chaque élément, on calcule sa nouvelle position
        parallaxElements.forEach(el => {
            let speed = el.getAttribute('data-speed');
            // window.pageYOffset donne la position actuelle du scroll
            let yPos = -(window.pageYOffset * speed);
            
            // On applique le mouvement vers le haut via transform
            el.style.transform = `translateY(${yPos}px)`;
        });
    });
</script>
</body>
</html>
