<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Shower</title>
    <link rel="icon" type="image/png" href="src/svg/sakura.svg" />
    <link rel="stylesheet" href="../style/style.css"  >
    <link rel="stylesheet" href="../style/galerie.css"  >

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
</head>


<body>
    <section class="hero">

        <div class="hero-div">
            <h1>Sakura Shower</h1>
            <h2>The flower gallery</h2>
        </div>

    </section>



    <section class="gallery container">

        <img class="photo" src="../src/image.jpg">
        <img class="photo" src="../src/header.jpg">
        <img class="photo" src="../src/image2.jpg">
        <img class="photo" src="../src/image2_glass.jpg">
        <img class="photo" src="../src/image_glass.jpg">

    </section>
    
    <div class="modal" id="modal">
        <div class="modal-overlay"></div>

        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modal-img" src="">
        </div>
    </div>



<script>
    /* window.addEventListener('scroll', function() {
        let parallaxElements = document.querySelectorAll('[data-speed]');
        
        // Pour chaque élément, on calcule sa nouvelle position
        parallaxElements.forEach(el => {
            let speed = el.getAttribute('data-speed');
            // window.pageYOffset donne la position actuelle du scroll
            let yPos = -(window.pageYOffset * speed);
            
            // On applique le mouvement vers le haut via transform
            el.style.transform = `translateY(${yPos}px)`;
        });
    }); */

    const photos = document.querySelectorAll(".photo");
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modal-img");
        const closeBtn = document.querySelector(".close");

        photos.forEach(photo => {
            photo.addEventListener("click", () => {
                const img = photo.src;
                
                modalImg.src = img;

                modal.classList.add("active");
            });
        });

        closeBtn.addEventListener("click", () => {
            modal.classList.remove("active");
        });

        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.remove("active");
            }
        });
</script> 
</body>
</html>
